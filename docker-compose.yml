version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: splitwise_db
    environment:
      POSTGRES_USER: splitwise_user
      POSTGRES_PASSWORD: splitwise_password
      POSTGRES_DB: splitwise_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
