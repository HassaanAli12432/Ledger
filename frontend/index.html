<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Splitwise Clone — Track shared expenses, settle debts, and manage group finances with elegance." />
    <title>Ledger — Shared Expense Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,900;1,400;1,700&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.addEventListener('error', function(e) {
        const errStr = e.error ? (e.error.stack || e.error.message) : e.message;
        document.body.innerHTML += '<div style="color: red; padding: 20px; background: white; position: fixed; top: 0; left: 0; right: 0; z-index: 999999; overflow: auto; max-height: 100vh;"><h1>Global Javascript Error!</h1><pre style="white-space: pre-wrap;">' + errStr + '</pre></div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
